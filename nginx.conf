# Nginx config for ineedq.com
# Deploy to: /etc/nginx/conf.d/ineedq.conf
#
# After placing this file:
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ineedq.com www.ineedq.com;

    # Let certbot handle ACME challenge (needed for initial cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ineedq.com www.ineedq.com;

    ssl_certificate     /etc/letsencrypt/live/ineedq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ineedq.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve the built React frontend
    root  /home/ec2-user/capstone-trend-pilot-app/frontend/dist;
    index index.html;

    # Proxy /api/* to FastAPI backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # long enough for /api/trends (20-60s)
        proxy_send_timeout 120s;
        client_max_body_size 20m;  # allow image uploads up to 20MB
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
